# mqttd example configuration (ADR 0046)
#
# Load with:  mqttd --config /etc/mqttd/mqttd.toml   (or set MQTTD_CONFIG=<path>)
# Validate:   mqttd --check-config --config /etc/mqttd/mqttd.toml   (binds nothing)
#
# Precedence (least to most specific):  defaults < this file < MQTTD_* env vars < CLI flags.
# Every setting here has a matching `MQTTD_*` environment variable (see the README) — the two
# surfaces never diverge (a CI test enforces the mapping). Unset = the secure default.
#
# The schema is STRICT: an unknown key or a wrong type fails the load with a located error,
# so a typo is caught at `--check-config` time, never silently ignored.
#
# Hot reload: edit this file and send SIGHUP (or set [runtime] config_watch_secs) to reload the
# whole config through the validate-before-swap path. Live-swappable settings (ACL/auth/TLS
# material, allow_anonymous, the state quotas) change without a restart; everything else is
# logged as "requires restart". A bad edit is rejected and the running config kept.
#
# SECRETS BY REFERENCE (ADR 0046 T5): this file is safe to commit to git / mount from a
# ConfigMap. All secret material is referenced BY PATH (TLS keys, password file, JWT keys, the
# gossip key) — mount those paths from a Kubernetes Secret. The only raw-secret-in-a-value option
# is the inline `[cluster.swim] key`; prefer `key_file` (below) to keep it out of the file too.

[node]
# Stable identifier for this node (default "node-local"). Must be unique per node.
id = "node-1"
# Directory for on-disk persistence (ADR 0018). With durable sessions on (the default) the lease
# group + replicated log live here and survive a full-cluster restart. Unset = in-memory only.
data_dir = "/var/lib/mqttd"
# This node's failure-domain label (ADR 0016), advertised over gossip so the topology
# self-assembles. Unset = unlabelled (unless a peer or the static map below supplies one).
# failure_domain = "rack-a"
# Static failure-domain topology (cluster-uniform); per-node gossip labels override it.
# [node.failure_domains]  # e.g.  n1 = "rack-a"  ;  n2 = "rack-b"

[listeners]
# Every listener is opt-in; unset = that transport is off. TLS is the intended path.
tls_bind = "0.0.0.0:8883"            # MQTT over TLS 1.3 (needs [tls] cert + key)
# wss_bind = "0.0.0.0:8884"          # MQTT over WebSocket-Secure (reuses [tls])
# quic_bind = "0.0.0.0:8885"         # MQTT over QUIC (reuses [tls])
health_bind = "0.0.0.0:8080"         # GET /livez, /readyz, /metrics
# metrics_bind = "127.0.0.1:9090"    # optional separate /metrics bind (internal only)
# plaintext_bind = "127.0.0.1:1883"  # INSECURE — local testing only
# ws_bind = "127.0.0.1:8083"         # INSECURE plaintext WebSocket — local/dev only

[tls]
# Server certificate chain + private key (PEM paths). The key is a secret — mount it, don't
# inline it. Rotating the file and reloading serves the new cert on the next handshake.
cert = "/etc/mqttd/tls/server.crt"
key = "/etc/mqttd/tls/server.key"
# Require client certificates (mTLS); identity becomes the certificate CN.
client_ca = "/etc/mqttd/tls/client-ca.crt"
# Certificate revocation list (needs client_ca); a listed client is refused at the handshake and
# its live session is evicted on reload. Hot-reloads on SIGHUP.
# crl = "/etc/mqttd/tls/client.crl"

[security]
# Anonymous access is OFF by default and loudly logged when enabled — do not enable in prod.
allow_anonymous = false
# Argon2id `username:phc-hash` password file (a secret — mount it).
# password_file = "/etc/mqttd/passwd"
# TOML topic-ACL policy (deny by default). Without it, authorization is NOT enforced (logged).
acl_file = "/etc/mqttd/acl.toml"
# Per-round enhanced-auth reply timeout, seconds (default 10).
# auth_timeout_secs = 10

[security.jwt]
# JWT verification key. HS256 secret and RS256 public key are both referenced BY FILE (T5).
# hs256_secret_file = "/run/secrets/jwt-hs256"   # the HMAC secret, from a Secret mount
# rs256_pem_file = "/etc/mqttd/jwt-rs256.pem"    # the RSA public key (PEM)
# issuer = "https://issuer.example"              # optional `iss` constraint
# audience = "mqttd"                             # optional `aud` constraint

[security.auth_penalty]
# Auth-failure penalty box (ADR 0041 T2): after `threshold` failures from one source address,
# its connections are closed at accept until the strikes decay. Keys on the address, never the
# username. Unset threshold = disabled.
# threshold = 10
# decay_secs = 60

[cluster]
# Inter-node peer listener + the cluster-bus mTLS material (set all three of ca/cert/key, or none
# for a loudly-logged plaintext mesh). The key is a secret — mount it.
peer_bind = "0.0.0.0:7001"
# peer_advertise = "node-1.mqttd.svc:7001"   # address peers dial, if it differs from the bind
[cluster.peer_tls]
# ca = "/etc/mqttd/cluster/ca.crt"
# cert = "/etc/mqttd/cluster/node.crt"
# key = "/etc/mqttd/cluster/node.key"
# crl = "/etc/mqttd/cluster/node.crl"        # cluster-CA-signed; hot-reloads

[cluster.swim]
# SWIM gossip membership (needs [cluster] peer_bind). Seeds = existing members to join through;
# a node with no seeds founds the lease group (exactly one founder per cluster).
bind = "0.0.0.0:7946"
seeds = ["node-2.mqttd.svc:7946", "node-3.mqttd.svc:7946"]
# The 64-hex gossip key. Prefer key_file (secret-by-reference) over the inline key; setting both
# is an error. `openssl rand -hex 32` generates one.
key_file = "/run/secrets/swim-key"
# key = "0123...cdef"                          # inline alternative (a raw secret in this file)
# key_accept = ["<old-hex>"]                   # extra keys accepted during a zero-downtime rotation
# signed = "require"                           # per-node gossip signatures (needs peer_tls + a key)
# replay = "require"                           # anti-replay (needs signed=require + data_dir)

[durable]
# Durable, consensus-backed replicated session storage is ON by default (ADR 0029). Set false for
# the lightweight in-memory store.
enabled = true
# Bounded lease-consensus voter set size (default 5, recommend odd). Note: >=5 durable nodes on a
# SINGLE host is fsync-bound (see the demo sizing note / ADR 0049).
lease_voters = 5
# Disk high-water cap over the on-disk stores, bytes (needs [node] data_dir). Above it the broker
# browns out growth-writes while acks/deletes/resumes continue. Unset = no watermark.
# store_max_bytes = 10737418240

[limits]
# Resource governance (ADR 0041). Unset generally = uncapped. A configured 0 where a positive
# value is required is a startup error.
# max_connections = 100000
# max_connections_per_ip = 1000
# max_sessions = 500000
# max_subscriptions_per_client = 1000
# max_retained_messages = 100000
# max_publish_rate = 10000            # msgs/sec per connection; over-rate = socket backpressure
max_queued_messages = 100000         # per-session offline queue (default 100000)
queue_overflow = "drop-oldest"       # or "reject-newest"
# max_packet_size = 1048576          # inbound ceiling, bytes (default 1 MiB, floor 1 KiB)
# receive_maximum = 256              # v5 Receive Maximum (default 256, floor 1)
# topic_alias_max = 16               # v5 Topic Alias Maximum (default 16; 0 disables)

[observability]
# OTLP/HTTP push export (ADR 0020). Unset = Prometheus /metrics endpoint only.
# otlp_endpoint = "http://collector:4318"
otlp_interval_secs = 10

[runtime]
# Graceful-shutdown drain window, seconds (default 30; 0 = drain immediately).
shutdown_grace_secs = 30
# Smallest mesh size /readyz accepts (default 1). Raise to hold a node out of rotation until it
# has joined its peers.
ready_min_members = 1
# Filesystem config-watch poll interval, seconds (default 0 = signal-only). Set it to auto-reload
# this file (and the referenced policy files) on change — the Kubernetes ConfigMap case.
# config_watch_secs = 5
