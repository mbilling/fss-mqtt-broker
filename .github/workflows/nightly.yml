# The nightly deep tier (ADR 0044 P4): what per-PR minutes cannot buy —
# wide seed sweeps over real processes, the two-binary rolling upgrade,
# an hour-long soak judged on drift watermarks, and fuzz time.
#
# A nightly failure is triaged with the ADR 0042 exhibit-ledger discipline:
# it lands as a row in the ADR 0044 findings ledger (docs/delivery/
# 0044-release-readiness-assurance.md) before it is fixed or waived.
name: nightly

on:
  schedule:
    - cron: "17 3 * * *" # 03:17 UTC daily (off the :00 stampede)
  workflow_dispatch: # and on demand

env:
  CARGO_TERM_COLOR: always

jobs:
  proc-sweep:
    name: out-of-process seed sweep
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # 8 seeds ≈ 8 full spawn/kill/restart schedules (serialized by design).
      - name: cluster_proc sweep
        run: MQTTD_PROC_SEEDS=8 cargo test -p mqttd --test cluster_proc -- --nocapture

  stress-sweep:
    name: in-process stress sweep
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # The ADR 0042 soak profile: widen the seeded fault schedules.
      - name: cluster_stress sweep
        run: MQTTD_STRESS_SEEDS=8 cargo test -p mqttd --test cluster_stress -- --nocapture

  upgrade:
    name: two-binary rolling upgrade
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # the baseline is built from a pinned historic ref
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: rolling upgrade + rollback (ADR 0044 P3)
        run: cargo test -p mqttd --test cluster_upgrade -- --ignored --nocapture

  soak:
    name: one-hour soak (drift watermarks)
    runs-on: ubuntu-latest
    timeout-minutes: 110
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: soak (RSS / FD / p99 drift)
        run: MQTTD_SOAK_SECS=3600 cargo test -p mqttd --test cluster_soak -- --ignored --nocapture

  bench:
    name: hot-path benchmarks (ADR 0044 P6)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Print current criterion numbers for comparison against
      # docs/benchmarks/BASELINE.md. A meaningful shift is investigated and the
      # baseline updated with the commit that moved it (the per-PR perf_gate
      # test is the automatic floor; this is the human-read record).
      - name: codec + durable-plane benches
        run: |
          cargo bench -p mqtt-codec --bench codec
          cargo bench -p mqtt-cluster --bench durable_hotpaths

  fuzz:
    name: fuzz every attacker-reachable parser (ADR 0044 P5)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false # one target's finding must not hide the others' runs
      matrix:
        include:
          - crate: crates/mqtt-codec
            target: packet_decode # client-facing MQTT packets
          - crate: crates/mqtt-cluster
            target: peer_decode # peer-bus frames
          - crate: crates/mqtt-cluster
            target: swim_message # gossip message body (post-auth)
          - crate: crates/mqtt-cluster
            target: gossip_open # gossip datagram (pre-auth, most exposed)
          - crate: crates/mqtt-auth
            target: crl_parse # CRL DER (operator file, hot-reloaded)
          - crate: crates/mqtt-auth
            target: acl_parse # ACL TOML (operator file, hot-reloaded)
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@nightly # libFuzzer needs nightly rustc
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      # 12 minutes per target. The first corpus dir (gitignored, ephemeral in
      # CI) is where libFuzzer writes coverage-expanding units; the committed
      # seed corpus is passed read-only as an additional input. A crash writes a
      # fuzz/artifacts/ reproducer and fails the job (see SECURITY.md).
      - name: fuzz ${{ matrix.target }}
        working-directory: ${{ matrix.crate }}
        run: |
          cargo +nightly fuzz run ${{ matrix.target }} \
            fuzz/corpus/${{ matrix.target }} fuzz/seeds/${{ matrix.target }} \
            -- -max_total_time=720
