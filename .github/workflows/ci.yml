name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: build, test, lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --all-targets --all-features
      - name: Test
        shell: bash
        run: |
          # Run every test (no fail-fast so all failures surface at once), tee the
          # output, then re-emit failing test names and panic sites as ::error::
          # annotations. Annotations are visible in the run UI and via the check-run
          # annotations API without repo-admin access, so a flaky failure is
          # diagnosable from the API alone.
          set +e
          cargo test --all --no-fail-fast 2>&1 | tee test-output.txt
          code=${PIPESTATUS[0]}
          if [ "$code" -ne 0 ]; then
            grep -E '^test .+ \.\.\. FAILED' test-output.txt | sort -u \
              | sed 's/^/::error title=Test failed::/' || true
            grep -E 'panicked at .+' test-output.txt | sort -u | head -n 20 \
              | sed 's/^/::error title=Panic::/' || true
          fi
          exit "$code"

  docs:
    name: delivery dashboard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Status dashboard is up to date
        run: python3 scripts/gen-status.py --check

  interop:
    name: foreign-client interop (mosquitto + paho)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # ADR 0034 / ADR 0044 P7: drive the real mqttd binary with TWO independent
      # non-Rust clients (Eclipse Mosquitto CLI + Eclipse Paho Python). Both are
      # external processes, not cargo deps — no addition to the broker's supply chain.
      - name: Install mosquitto clients
        run: sudo apt-get update && sudo apt-get install -y mosquitto-clients
      - name: Install Paho
        run: python3 -m pip install --quiet paho-mqtt
      - name: Build broker
        run: cargo build --quiet -p mqttd
      - name: Interop conformance (mosquitto)
        run: MQTTD_BIN=target/debug/mqttd ./scripts/interop/run.sh
      - name: Interop conformance (paho — reason codes, properties, session)
        run: |
          PORT=$(python3 -c "import socket;s=socket.socket();s.bind(('127.0.0.1',0));print(s.getsockname()[1]);s.close()")
          HPORT=$(python3 -c "import socket;s=socket.socket();s.bind(('127.0.0.1',0));print(s.getsockname()[1]);s.close()")
          MQTTD_PLAINTEXT_BIND=127.0.0.1:$PORT MQTTD_ALLOW_ANONYMOUS=1 \
            MQTTD_HEALTH_BIND=127.0.0.1:$HPORT RUST_LOG=off target/debug/mqttd &
          for _ in $(seq 1 100); do curl -fsS http://127.0.0.1:$HPORT/readyz >/dev/null 2>&1 && break; sleep 0.1; done
          MQTT_PORT=$PORT python3 scripts/interop/paho_conformance.py
      - name: Quickstart smoke (the README's own two-node cluster)
        run: MQTTD_BIN=target/debug/mqttd ./scripts/quickstart-smoke.sh

  supply-chain:
    name: supply-chain audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: cargo-deny
        run: cargo deny check
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: cargo-audit
        run: cargo audit

  helm:
    name: helm chart (lint + template + kubeconform)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.3
      - name: Install kubeconform
        run: |
          curl -fsSL -o kubeconform.tar.gz \
            https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar xzf kubeconform.tar.gz kubeconform
          sudo mv kubeconform /usr/local/bin/
      # ADR 0047: the chart is our operator contract; lint it, render it (default + a bounded
      # single-node override), and schema-validate every rendered manifest. Renders offline — no
      # cluster needed. The kind/k3d runtime smoke (T5) lives in the nightly tier.
      - name: helm lint
        run: helm lint deploy/helm/mqttd
      - name: helm template + kubeconform (defaults)
        run: |
          helm template mqttd deploy/helm/mqttd | tee /tmp/rendered.yaml | \
            kubeconform -strict -summary -ignore-missing-schemas \
              -schema-location default \
              -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json'
      - name: helm template + kubeconform (single-node, PDB off)
        run: |
          helm template mqttd deploy/helm/mqttd \
            --set replicaCount=1 --set podDisruptionBudget.enabled=false \
            --set persistence.enabled=false | \
            kubeconform -strict -summary -ignore-missing-schemas -schema-location default
      # The rendered per-pod config template must itself be valid input to --check-config once its
      # placeholders are filled — a quick shell-level render mirrors the init container.
      - name: Rendered config is check-config-valid
        run: |
          helm template mqttd deploy/helm/mqttd \
            | awk '/mqttd.toml.tmpl: \|-/{f=1;next} f&&/^    /{sub(/^    /,"");print;next} f{exit}' \
            | sed -e 's/__NODE_ID__/mqttd-0/g' -e 's/__SEEDS__//g' \
                  -e 's|__PEER_ADVERTISE__|mqttd-0.mqttd-headless.default.svc.cluster.local:7001|g' > /tmp/rendered.toml
          echo "--- rendered founder config ---"; cat /tmp/rendered.toml
          cargo build --quiet -p mqttd
          target/debug/mqttd --check-config --config /tmp/rendered.toml
