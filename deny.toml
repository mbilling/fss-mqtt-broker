# cargo-deny configuration — supply-chain gating for CI.
# Run: cargo deny check

[advisories]
version = 2
yanked = "deny"
ignore = [
    # bincode 1.3.3 is archived (team ceased development; 1.3.3 declared complete).
    # Used only for the internal cluster wire format (peer frames + SWIM datagrams);
    # migrating to an actively-maintained codec is tracked cluster work.
    "RUSTSEC-2025-0141",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Internal workspace crates are version-less `path` dependencies, which cargo-deny
# counts as wildcards. Allow only those; registry wildcards remain denied.
allow-wildcard-paths = true

[licenses]
version = 2
# Permissive licenses compatible with an Apache-2.0 project.
allow = [
    "Apache-2.0",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
