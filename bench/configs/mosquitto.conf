# Mosquitto benchmark config (ADR 0048): the documented, reasonable minimum for an open
# benchmark listener — NOT a tuned config, and not a crippled one. Two listeners, matching
# the harness's two disclosed postures:
#   1883 — plaintext, anonymous (the T1 like-for-like posture)
#   8883 — TLS with REQUIRED client certificates (the T2 mTLS posture)
allow_anonymous true
persistence false
# Don't measure the logger (mosquitto logs every connect/disconnect by default).
log_type error
log_type warning

listener 1883

listener 8883
cafile /certs/ca.pem
certfile /certs/server.pem
keyfile /certs/server.key
require_certificate true
