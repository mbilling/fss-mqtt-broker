# Mosquitto benchmark config (ADR 0048): the documented, reasonable minimum for an open
# benchmark listener — NOT a tuned config, and not a crippled one. Matches the harness
# posture: plaintext, anonymous, in-memory sessions.
listener 1883
allow_anonymous true
persistence false
# Don't measure the logger (mosquitto logs every connect/disconnect by default).
log_type error
log_type warning
# No artificial message/inflight limits beyond mosquitto's defaults.
