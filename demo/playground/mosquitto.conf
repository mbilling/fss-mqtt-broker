# Playground gateway (demo only): MQTT-over-WebSockets entry point for browsers,
# bridged into the mqttd cluster. The web UI is served separately by the `playground`
# (nginx) service; this service is MQTT-over-WS + the cluster bridge only.
#
# Browsers cannot speak raw MQTT/TCP, only MQTT-over-WebSockets, and mqttd has no WS
# listener yet (deferred ADR 0002 item) — so this mosquitto instance is the browser's
# WS entry point, bridged to the cluster over plain MQTT.

listener 9001
protocol websockets
allow_anonymous true

# Bridge to the cluster (node mqttd-1). Browser publishes land on play/up/# and are
# mirrored OUT to the cluster; a cluster-side relay (see entrypoint.sh) republishes them
# to play/down/#, which is mirrored IN to the browser subscribers. The disjoint up/down
# trees give every message a full cluster round-trip with NO bridge echo.
connection mqttd-cluster
address mqttd-1:1883
bridge_protocol_version mqttv311
# try_private sends a mosquitto-specific bridge bit in CONNECT that non-mosquitto brokers
# (mqttd) reject — turn it off so the bridge connects as an ordinary MQTT client.
try_private false
cleansession true
notifications false
topic play/up/# out 0
topic play/down/# in 0
# Also surface the live loadgen traffic so the page can watch real cluster messages.
topic demo/# in 0
